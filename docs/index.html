  <style>
    :root {
      --cream: #fbf6ea;
      --paper: #fffdf8;
      --ink: #171714;
      --muted: #77736c;
      --line: rgba(23, 23, 20, .12);
      --honey: #f5bd32;
      --green: #617158;
    }
    * { box-sizing: border-box; }
    html { background: #eeeae1; scroll-behavior: smooth; }
    body {
      margin: 0;
      color: var(--ink);
      background: var(--cream);
      font-family: Pretendard, -apple-system, BlinkMacSystemFont, "Segoe UI",
        "Malgun Gothic", sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    button, input { font: inherit; }
    a { color: inherit; text-decoration: none; }
    .app {
      width: min(100%, 680px);
      min-height: 100vh;
      margin: 0 auto;
      padding-bottom: calc(92px + env(safe-area-inset-bottom));
      background: var(--cream);
      box-shadow: 0 0 38px rgba(30, 28, 22, .08);
    }
    .topbar {
      position: sticky;
      z-index: 20;
      top: 0;
      height: 54px;
      display: flex;
      align-items: center;
      padding: 0 16px;
      border-bottom: 1px solid var(--line);
      background: rgba(251, 246, 234, .94);
      backdrop-filter: blur(14px);
    }
    .wordmark { flex: 1; font-size: 17px; font-weight: 900; letter-spacing: -.5px; }
    .wordmark small { margin-left: 5px; color: var(--muted); font-size: 11px; font-weight: 600; }
    .top-icon { width: 38px; text-align: center; font-size: 21px; }
    .notice {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 12px 17px;
      background: #89867e;
      color: white;
      font-size: 13px;
      font-weight: 700;
    }
    .notice-badge {
      width: 22px; height: 22px; display: grid; place-items: center;
      border-radius: 50%; background: #7967ee; font-size: 11px;
    }
    .hero { padding: 28px 18px 12px; text-align: center; }
    .avatar {
      width: 122px; height: 122px; margin: 0 auto 15px;
      display: grid; place-items: center;
      border: 1px solid rgba(0,0,0,.08); border-radius: 50%;
      background: var(--paper); box-shadow: 0 3px 12px rgba(0,0,0,.05);
      overflow: hidden;
    }
    .avatar img { width: 100%; height: 100%; display: block; object-fit: cover; }
    .hero h1 { margin: 0; font-size: 27px; letter-spacing: -1.2px; }
    .hero p {
      margin: 10px 0 0; color: var(--muted);
      font-size: 13px; line-height: 1.7;
    }
    .social {
      width: 38px; height: 38px; margin: 18px auto 0;
      display: grid; place-items: center; border-radius: 50%;
      background: var(--paper); font-weight: 900;
    }
    .search-wrap { padding: 10px 17px 20px; }
    .search {
      width: 100%; height: 48px; padding: 0 17px 0 43px;
      border: 0; border-radius: 16px; outline: none;
      background: white; color: var(--ink);
      box-shadow: 0 5px 18px rgba(35, 32, 25, .06);
    }
    .search-box { position: relative; }
    .search-box::before {
      content: "⌕"; position: absolute; left: 17px; top: 11px;
      z-index: 1; color: var(--muted); font-size: 22px;
    }
    .tabs {
      display: grid; grid-template-columns: repeat(4, 1fr);
      border-bottom: 1px solid var(--line);
    }
    .tab {
      position: relative; padding: 15px 4px;
      color: #827f78; text-align: center; font-size: 12px; font-weight: 700;
    }
    .tab.active { color: var(--ink); }
    .tab.active::after {
      content: ""; position: absolute; left: 15%; right: 15%; bottom: 0;
      height: 3px; background: var(--ink);
    }
    .categories {
      display: flex; gap: 8px; overflow-x: auto;
      padding: 14px 17px 4px; scrollbar-width: none;
      scroll-snap-type: x proximity;
    }
    .categories::-webkit-scrollbar { display: none; }
    .category-button {
      flex: 0 0 auto; scroll-snap-align: start;
      padding: 9px 13px; border: 1px solid rgba(23,23,20,.12);
      border-radius: 999px; background: rgba(255,255,255,.72);
      color: #68645c; font-size: 12px; font-weight: 800;
      cursor: pointer;
    }
    .category-button.active {
      border-color: var(--ink); background: var(--ink); color: white;
    }
    .category-heading {
      padding: 32px 17px 0; font-size: 17px; font-weight: 900;
      letter-spacing: -.4px;
    }
    .intro { padding: 56px 20px 32px; text-align: center; }
    .zigzag { color: #aaa69d; letter-spacing: 3px; font-size: 17px; }
    .intro h2 { margin: 34px 0 0; font-size: 17px; letter-spacing: .2px; }
    .intro .icons { margin-top: 28px; font-size: 23px; }
    .intro p { margin: 8px 0 0; color: #69665f; font-size: 13px; line-height: 1.7; }
    .pick-section { padding-top: 16px; }
    .pick-head { padding: 18px 17px 18px; text-align: center; }
    .pick-kicker {
      color: #9c7b1d; font-size: 10px; font-weight: 900;
      letter-spacing: 1.8px;
    }
    .pick-head h2 { margin: 6px 0 0; font-size: 22px; letter-spacing: -.7px; }
    .pick-head p { margin: 7px 0 0; color: var(--muted); font-size: 12px; }
    .pick-carousel { position: relative; }
    .pick-feed {
      display: flex; gap: 10px; overflow-x: auto;
      padding: 0 17px 12px; scroll-padding-inline: 17px;
      scroll-snap-type: x mandatory; scrollbar-width: none;
      overscroll-behavior-inline: contain;
      cursor: grab; user-select: none; touch-action: pan-y;
    }
    .pick-feed.dragging { cursor: grabbing; scroll-snap-type: none; }
    .pick-feed::-webkit-scrollbar { display: none; }
    .pick-column {
      flex: 0 0 clamp(185px, 46vw, 260px);
      width: clamp(185px, 46vw, 260px);
      display: grid;
      grid-template-rows: repeat(2, clamp(185px, 42vw, 240px));
      gap: 10px; scroll-snap-align: start;
    }
    .pick-feed .card,
    .pick-feed .card:nth-child(3n+1) {
      width: 100%; height: 100%;
      min-height: 0; grid-row: auto; scroll-snap-align: none;
    }
    .pick-feed .card img { -webkit-user-drag: none; user-select: none; }
    .pick-arrow {
      position: absolute; z-index: 5; top: 50%;
      width: 38px; height: 38px; display: grid; place-items: center;
      transform: translateY(-50%); border: 1px solid rgba(255,255,255,.7);
      border-radius: 50%; background: rgba(33,32,28,.68); color: white;
      box-shadow: 0 4px 14px rgba(0,0,0,.18); cursor: pointer;
      font-size: 23px; line-height: 1; backdrop-filter: blur(10px);
    }
    .pick-arrow.prev { left: 5px; }
    .pick-arrow.next { right: 5px; }
    .pick-arrow:disabled { opacity: 0; pointer-events: none; }
    .feed {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      padding: 0 17px 24px;
    }
    .card {
      position: relative; min-height: 245px; overflow: hidden;
      border-radius: 15px; background: #e9e5dc;
      box-shadow: 0 4px 16px rgba(34, 31, 25, .06);
    }
    .card:nth-child(3n+1) { grid-row: span 2; min-height: 430px; }
    .card img { width: 100%; height: 100%; display: block; object-fit: cover; transition: transform .25s ease; }
    .card:hover img { transform: scale(1.018); }
    .shade {
      position: absolute; inset: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,.35), transparent 34%, rgba(0,0,0,.12));
    }
    .card-copy { position: absolute; z-index: 2; top: 12px; left: 12px; right: 34px; color: white; }
    .brand { font-size: 11px; font-weight: 800; opacity: .9; }
    .title { margin-top: 3px; font-size: 13px; font-weight: 800; line-height: 1.35; text-shadow: 0 1px 5px rgba(0,0,0,.25); }
    .category-label {
      position: absolute; z-index: 2; right: 12px; bottom: 12px;
      display: inline-flex; padding: 4px 7px;
      border-radius: 999px; background: rgba(255,255,255,.9);
      color: #40392e; font-size: 10px; font-weight: 900;
      text-shadow: none; backdrop-filter: blur(8px);
    }
    .price {
      position: absolute; z-index: 2; left: 12px; bottom: 12px;
      padding: 6px 9px; border-radius: 999px;
      background: rgba(255,255,255,.88); font-size: 11px; font-weight: 800;
      backdrop-filter: blur(8px);
    }
    .external {
      position: absolute; z-index: 2; top: 11px; right: 11px;
      width: 26px; height: 26px; display: grid; place-items: center;
      border-radius: 7px; background: rgba(35,35,32,.55); color: white; font-size: 12px;
    }
    .empty {
      grid-column: 1 / -1; padding: 70px 20px;
      color: var(--muted); text-align: center; line-height: 1.7;
    }
    .bottom-nav {
      position: fixed; z-index: 30;
      left: 50%; bottom: max(12px, env(safe-area-inset-bottom));
      width: min(calc(100% - 28px), 640px); height: 66px;
      display: grid; grid-template-columns: repeat(4, 1fr);
      transform: translateX(-50%);
      border: 1px solid rgba(255,255,255,.7); border-radius: 28px;
      background: rgba(245,245,242,.86); box-shadow: 0 7px 26px rgba(0,0,0,.15);
      backdrop-filter: blur(18px);
    }
    .nav-item { display: grid; place-items: center; color: #30302c; font-size: 23px; }
    .nav-search-icon {
      width: 25px; height: 25px; display: block;
      fill: none; stroke: currentColor; stroke-width: 1.9;
      stroke-linecap: round; stroke-linejoin: round;
    }
    .nav-item.active {
      margin: 7px; border-radius: 20px; background: rgba(70,68,63,.64); color: white;
    }
    .loading { grid-column: 1 / -1; padding: 60px; text-align: center; color: var(--muted); }
    .feed-sentinel {
      padding: 10px 20px 34px; color: var(--muted);
      text-align: center; font-size: 12px;
    }
    .feed-sentinel[hidden] { display: none; }
    @media (max-width: 390px) {
      .feed { padding-inline: 10px; gap: 6px; }
      .pick-feed { padding-inline: 10px; gap: 8px; scroll-padding-inline: 10px; }
      .pick-column { gap: 8px; }
      .card { min-height: 215px; }
      .card:nth-child(3n+1) { min-height: 380px; }
      .pick-feed .card,
      .pick-feed .card:nth-child(3n+1) { min-height: 0; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="wordmark">모아베베 MOABEBE <small>아기와 함께</small></div>
      <div class="top-icon">♡</div><div class="top-icon">☰</div>
    </header>
    <div class="notice"><span class="notice-badge">M</span>모아베베가 고른 오늘의 아기옷을 만나보세요 <span style="margin-left:auto">›</span></div>
    <section class="hero">
      <div class="avatar"><img src="logo.png" alt="모아베베 로고"></div>
      <h1>모아베베 MOABEBE</h1>
      <p>피드에서 먼저 발견한<br>모아베베의 특별한 상품들이에요.<br>눈여겨 본 아이템을 가장 빠르게 만나보세요.</p>
      <div class="social">◎</div>
    </section>
    <div class="search-wrap"><div class="search-box"><input id="search" class="search" placeholder="상품 검색하기"></div></div>
    <nav class="tabs"><div class="tab active">SELECT</div><div class="tab">BABY</div><div class="tab">LIFE</div><div class="tab">ABOUT</div></nav>
    <section id="pick-section" class="pick-section" hidden>
      <div class="pick-head">
        <div class="pick-kicker">EDITOR'S CHOICE</div>
        <h2>모아베베 PICK</h2>
        <p>모아베베가 직접 고른 추천 아이템이에요.</p>
      </div>
      <div class="pick-carousel">
        <button id="pick-prev" class="pick-arrow prev" type="button" aria-label="이전 PICK">‹</button>
        <div id="pick-feed" class="pick-feed"></div>
        <button id="pick-next" class="pick-arrow next" type="button" aria-label="다음 PICK">›</button>
      </div>
    </section>
    <div class="category-heading">전체 카테고리</div>
    <nav id="categories" class="categories" aria-label="상품 카테고리"></nav>
    <section id="feed" class="feed"><div class="loading">상품을 불러오는 중이에요.</div></section>
    <div id="feed-sentinel" class="feed-sentinel" hidden></div>
  </main>
  <nav class="bottom-nav">
    <a class="nav-item active" href="#">⌂</a><a class="nav-item" href="#feed">♡</a>
    <a id="search-nav" class="nav-item" href="#search" aria-label="상품 검색">
      <svg class="nav-search-icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="10.8" cy="10.8" r="6.2"></circle><path d="m15.4 15.4 4.2 4.2"></path></svg>
    </a><a class="nav-item" href="#">♙</a>
  </nav>
  <script>
    const feed = document.getElementById("feed");
    const feedSentinel = document.getElementById("feed-sentinel");
    const pickSection = document.getElementById("pick-section");
    const pickFeed = document.getElementById("pick-feed");
    const pickPrev = document.getElementById("pick-prev");
    const pickNext = document.getElementById("pick-next");
    const search = document.getElementById("search");
    const searchNav = document.getElementById("search-nav");
    const categoryNav = document.getElementById("categories");
    let products = [];
    let activeCategory = "전체";
    let filteredProducts = [];
    let renderedProductCount = 0;
    let searchTimer = null;
    const FEED_BATCH_SIZE = 40;
    let pickDragging = false;
    let pickDragMoved = false;
    let pickDragAxis = "";
    let pickPointerId = null;
    let pickDragStartX = 0;
    let pickDragStartY = 0;
    let pickDragStartScroll = 0;
    let suppressPickClick = false;

    const escapeHtml = (value) => String(value ?? "")
      .replaceAll("&", "&amp;").replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;").replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");

    function renderCategories() {
      const preferredOrder = ["의류", "패션잡화", "수유·이유식", "기저귀·위생", "목욕·스킨케어", "수면·침구", "외출·안전", "놀이·완구", "기타"];
      const available = new Set(products.map((item) => item.category || "기타"));
      const categories = ["전체", ...preferredOrder.filter((name) => available.has(name))];
      categoryNav.innerHTML = categories.map((name) => `
        <button class="category-button ${name === activeCategory ? "active" : ""}" data-category="${escapeHtml(name)}">${escapeHtml(name)}</button>
      `).join("");
    }

    const cardTemplate = (item) => `
      <a class="card" draggable="false" href="${escapeHtml(item.affiliate_url || item.product_url)}" target="_blank" rel="noopener sponsored">
        <img draggable="false" loading="lazy" src="${escapeHtml(item.image)}" alt="${escapeHtml(item.title)}">
        <div class="shade"></div>
        <div class="card-copy"><div class="brand">${escapeHtml(item.brand_name)}</div><div class="title">${escapeHtml(item.title)}</div></div>
        <div class="external">↗</div>
        ${item.sale_price ? `<div class="price">${escapeHtml(item.sale_price)}</div>` : ""}
        <div class="category-label">${escapeHtml(item.category || "기타")}</div>
      </a>
    `;

    function renderPicks() {
      const picks = products
        .filter((item) => Boolean(item.is_moabebe_pick))
        .sort((left, right) => String(right.picked_at || "").localeCompare(String(left.picked_at || "")));
      pickSection.hidden = !picks.length;
      const columns = [];
      for (let index = 0; index < picks.length; index += 2) {
        columns.push(`<div class="pick-column">${picks.slice(index, index + 2).map(cardTemplate).join("")}</div>`);
      }
      pickFeed.innerHTML = columns.join("");
      pickFeed.scrollLeft = 0;
      requestAnimationFrame(updatePickArrows);
    }

    function updatePickArrows() {
      const maxScroll = Math.max(0, pickFeed.scrollWidth - pickFeed.clientWidth);
      pickPrev.disabled = pickFeed.scrollLeft <= 2;
      pickNext.disabled = pickFeed.scrollLeft >= maxScroll - 2;
    }

    function movePicks(direction) {
      const column = pickFeed.querySelector(".pick-column");
      const distance = column ? column.getBoundingClientRect().width + 10 : pickFeed.clientWidth * .8;
      pickFeed.scrollBy({left: distance * direction, behavior: "smooth"});
    }

    function finishPickDrag(event = null) {
      if (!pickDragging) return;
      if (event && pickPointerId !== null && event.pointerId !== pickPointerId) return;
      pickDragging = false;
      pickFeed.classList.remove("dragging");
      if (pickDragMoved) {
        suppressPickClick = true;
        setTimeout(() => { suppressPickClick = false; }, 250);
      }
      pickPointerId = null;
      pickDragAxis = "";
      updatePickArrows();
    }

    function appendNextFeedBatch() {
      if (renderedProductCount >= filteredProducts.length) {
        feedSentinel.hidden = true;
        return;
      }
      const nextItems = filteredProducts.slice(
        renderedProductCount,
        renderedProductCount + FEED_BATCH_SIZE
      );
      feed.insertAdjacentHTML("beforeend", nextItems.map(cardTemplate).join(""));
      renderedProductCount += nextItems.length;
      feedSentinel.hidden = renderedProductCount >= filteredProducts.length;
      feedSentinel.textContent = `${renderedProductCount} / ${filteredProducts.length}개 · 아래로 스크롤하면 더 보여요`;
    }

    function refreshFeed() {
      const keyword = search.value.trim().toLowerCase();
      filteredProducts = products.filter((item) => {
        const category = item.category || "기타";
        return (activeCategory === "전체" || category === activeCategory)
          && `${item.brand_name} ${item.title} ${category}`.toLowerCase().includes(keyword);
      });
      renderedProductCount = 0;
      feed.innerHTML = "";
      if (!filteredProducts.length) {
        feedSentinel.hidden = true;
        feed.innerHTML = `<div class="empty">${keyword ? "검색 결과가 없어요." : "아직 등록된 상품이 없어요.<br>곧 예쁜 상품으로 채워드릴게요."}</div>`;
        return;
      }
      appendNextFeedBatch();
    }

    fetch(`data/products.json?v=${Date.now()}`)
      .then((response) => response.ok ? response.json() : [])
      .then((data) => { products = Array.isArray(data) ? data : []; renderPicks(); renderCategories(); refreshFeed(); })
      .catch(() => { feedSentinel.hidden = true; feed.innerHTML = '<div class="empty">상품을 불러오지 못했어요.<br>잠시 뒤 다시 시도해 주세요.</div>'; });
    search.addEventListener("input", () => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(refreshFeed, 180);
    });
    searchNav.addEventListener("click", (event) => {
      event.preventDefault();
      search.scrollIntoView({behavior: "smooth", block: "center"});
      search.focus({preventScroll: true});
    });
    categoryNav.addEventListener("click", (event) => {
      const button = event.target.closest("button[data-category]");
      if (!button) return;
      activeCategory = button.dataset.category;
      renderCategories();
      refreshFeed();
    });
    const feedObserver = new IntersectionObserver((entries) => {
      if (entries.some((entry) => entry.isIntersecting)) appendNextFeedBatch();
    }, {rootMargin: "400px 0px"});
    feedObserver.observe(feedSentinel);
    pickPrev.addEventListener("click", () => movePicks(-1));
    pickNext.addEventListener("click", () => movePicks(1));
    pickFeed.addEventListener("scroll", updatePickArrows, {passive: true});
    pickFeed.addEventListener("pointerdown", (event) => {
      if (event.pointerType === "mouse" && event.button !== 0) return;
      pickDragging = true;
      pickDragMoved = false;
      pickDragAxis = "";
      pickPointerId = event.pointerId;
      pickDragStartX = event.clientX;
      pickDragStartY = event.clientY;
      pickDragStartScroll = pickFeed.scrollLeft;
      pickFeed.classList.add("dragging");
      pickFeed.setPointerCapture(event.pointerId);
    });
    pickFeed.addEventListener("pointermove", (event) => {
      if (!pickDragging || event.pointerId !== pickPointerId) return;
      const distanceX = event.clientX - pickDragStartX;
      const distanceY = event.clientY - pickDragStartY;
      if (!pickDragAxis && Math.max(Math.abs(distanceX), Math.abs(distanceY)) > 5) {
        pickDragAxis = Math.abs(distanceX) > Math.abs(distanceY) ? "horizontal" : "vertical";
      }
      if (pickDragAxis === "vertical") return;
      if (pickDragAxis !== "horizontal") return;
      pickDragMoved = true;
      pickFeed.scrollLeft = pickDragStartScroll - distanceX;
      event.preventDefault();
    }, {passive: false});
    pickFeed.addEventListener("pointerup", finishPickDrag);
    pickFeed.addEventListener("pointercancel", finishPickDrag);
    pickFeed.addEventListener("dragstart", (event) => event.preventDefault());
    pickFeed.addEventListener("click", (event) => {
      if (!suppressPickClick) return;
      event.preventDefault();
      event.stopImmediatePropagation();
      suppressPickClick = false;
    }, true);
    window.addEventListener("resize", updatePickArrows);
  </script>
</body>
