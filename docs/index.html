<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#fbf6ea">
  <meta name="description" content="모아베베가 고른 아기옷과 육아 아이템">
  <title>모아베베 MOABEBE</title>
  <style>
    :root {
      --cream: #fbf6ea;
      --paper: #fffdf8;
      --ink: #171714;
      --muted: #77736c;
      --line: rgba(23, 23, 20, .12);
      --honey: #f5bd32;
      --green: #617158;
    }
    * { box-sizing: border-box; }
    html { background: #eeeae1; scroll-behavior: smooth; }
    body {
      margin: 0;
      color: var(--ink);
      background: var(--cream);
      font-family: Pretendard, -apple-system, BlinkMacSystemFont, "Segoe UI",
        "Malgun Gothic", sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    button, input { font: inherit; }
    a { color: inherit; text-decoration: none; }
    .app {
      width: min(100%, 680px);
      min-height: 100vh;
      margin: 0 auto;
      padding-bottom: calc(92px + env(safe-area-inset-bottom));
      background: var(--cream);
      box-shadow: 0 0 38px rgba(30, 28, 22, .08);
    }
    .topbar {
      position: sticky;
      z-index: 20;
      top: 0;
      height: 54px;
      display: flex;
      align-items: center;
      padding: 0 16px;
      border-bottom: 1px solid var(--line);
      background: rgba(251, 246, 234, .94);
      backdrop-filter: blur(14px);
    }
    .wordmark { flex: 1; font-size: 17px; font-weight: 900; letter-spacing: -.5px; }
    .wordmark small { margin-left: 5px; color: var(--muted); font-size: 11px; font-weight: 600; }
    .top-icon { width: 38px; text-align: center; font-size: 21px; }
    .notice {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 12px 17px;
      background: #89867e;
      color: white;
      font-size: 13px;
      font-weight: 700;
    }
    .notice-badge {
      width: 22px; height: 22px; display: grid; place-items: center;
      border-radius: 50%; background: #7967ee; font-size: 11px;
    }
    .hero { padding: 34px 18px 18px; text-align: center; }
    .avatar {
      width: 122px; height: 122px; margin: 0 auto 15px;
      display: grid; place-items: center;
      border: 1px solid rgba(0,0,0,.08); border-radius: 50%;
      background: var(--paper); box-shadow: 0 3px 12px rgba(0,0,0,.05);
      font-size: 57px;
    }
    .hero h1 { margin: 0; font-size: 27px; letter-spacing: -1.2px; }
    .hero p { margin: 8px 0 0; color: var(--muted); font-size: 13px; line-height: 1.65; }
    .social {
      width: 38px; height: 38px; margin: 18px auto 0;
      display: grid; place-items: center; border-radius: 50%;
      background: var(--paper); font-weight: 900;
    }
    .search-wrap { padding: 10px 17px 20px; }
    .search {
      width: 100%; height: 48px; padding: 0 17px 0 43px;
      border: 0; border-radius: 16px; outline: none;
      background: white; color: var(--ink);
      box-shadow: 0 5px 18px rgba(35, 32, 25, .06);
    }
    .search-box { position: relative; }
    .search-box::before {
      content: "⌕"; position: absolute; left: 17px; top: 11px;
      z-index: 1; color: var(--muted); font-size: 22px;
    }
    .tabs {
      display: grid; grid-template-columns: repeat(4, 1fr);
      border-bottom: 1px solid var(--line);
    }
    .tab {
      position: relative; padding: 15px 4px;
      color: #827f78; text-align: center; font-size: 12px; font-weight: 700;
    }
    .tab.active { color: var(--ink); }
    .tab.active::after {
      content: ""; position: absolute; left: 15%; right: 15%; bottom: 0;
      height: 3px; background: var(--ink);
    }
    .intro { padding: 56px 20px 32px; text-align: center; }
    .zigzag { color: #aaa69d; letter-spacing: 3px; font-size: 17px; }
    .intro h2 { margin: 34px 0 0; font-size: 17px; letter-spacing: .2px; }
    .intro .icons { margin-top: 28px; font-size: 23px; }
    .intro p { margin: 8px 0 0; color: #69665f; font-size: 13px; line-height: 1.7; }
    .feed {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      padding: 0 17px 24px;
    }
    .card {
      position: relative; min-height: 245px; overflow: hidden;
      border-radius: 15px; background: #e9e5dc;
      box-shadow: 0 4px 16px rgba(34, 31, 25, .06);
    }
    .card:nth-child(3n+1) { grid-row: span 2; min-height: 430px; }
    .card img { width: 100%; height: 100%; display: block; object-fit: cover; transition: transform .25s ease; }
    .card:hover img { transform: scale(1.018); }
    .shade {
      position: absolute; inset: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,.35), transparent 34%, rgba(0,0,0,.12));
    }
    .card-copy { position: absolute; z-index: 2; top: 12px; left: 12px; right: 34px; color: white; }
    .brand { font-size: 11px; font-weight: 800; opacity: .9; }
    .title { margin-top: 3px; font-size: 13px; font-weight: 800; line-height: 1.35; text-shadow: 0 1px 5px rgba(0,0,0,.25); }
    .price {
      position: absolute; z-index: 2; left: 12px; bottom: 12px;
      padding: 6px 9px; border-radius: 999px;
      background: rgba(255,255,255,.88); font-size: 11px; font-weight: 800;
      backdrop-filter: blur(8px);
    }
    .external {
      position: absolute; z-index: 2; top: 11px; right: 11px;
      width: 26px; height: 26px; display: grid; place-items: center;
      border-radius: 7px; background: rgba(35,35,32,.55); color: white; font-size: 12px;
    }
    .empty {
      grid-column: 1 / -1; padding: 70px 20px;
      color: var(--muted); text-align: center; line-height: 1.7;
    }
    .bottom-nav {
      position: fixed; z-index: 30;
      left: 50%; bottom: max(12px, env(safe-area-inset-bottom));
      width: min(calc(100% - 28px), 640px); height: 66px;
      display: grid; grid-template-columns: repeat(4, 1fr);
      transform: translateX(-50%);
      border: 1px solid rgba(255,255,255,.7); border-radius: 28px;
      background: rgba(245,245,242,.86); box-shadow: 0 7px 26px rgba(0,0,0,.15);
      backdrop-filter: blur(18px);
    }
    .nav-item { display: grid; place-items: center; color: #30302c; font-size: 23px; }
    .nav-item.active {
      margin: 7px; border-radius: 20px; background: rgba(70,68,63,.64); color: white;
    }
    .loading { grid-column: 1 / -1; padding: 60px; text-align: center; color: var(--muted); }
    @media (max-width: 390px) {
      .feed { padding-inline: 10px; gap: 6px; }
      .card { min-height: 215px; }
      .card:nth-child(3n+1) { min-height: 380px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="wordmark">모아베베 MOABEBE <small>아기와 함께</small></div>
      <div class="top-icon">♡</div><div class="top-icon">☰</div>
    </header>
    <div class="notice"><span class="notice-badge">M</span>모아베베가 고른 오늘의 아기옷을 만나보세요 <span style="margin-left:auto">›</span></div>
    <section class="hero">
      <div class="avatar">🐝</div>
      <h1>모아베베 MOABEBE</h1>
      <p>매일매일 입고 싶은 사랑스러운 옷,<br>엄마의 마음으로 하나씩 모았어요.</p>
      <div class="social">◎</div>
    </section>
    <div class="search-wrap"><div class="search-box"><input id="search" class="search" placeholder="상품 검색하기"></div></div>
    <nav class="tabs"><div class="tab active">SELECT</div><div class="tab">BABY</div><div class="tab">KIDS</div><div class="tab">ABOUT</div></nav>
    <section class="intro">
      <div class="zigzag">⌁⌁⌁⌁⌁⌁⌁⌁</div>
      <h2>MOABEBE SELECT</h2>
      <div class="icons">♡ 🍼 ♡</div>
      <p>피드에서 먼저 발견한<br>모아베베의 특별한 상품들이에요.<br>눈여겨 본 아이템을 가장 빠르게 만나보세요.</p>
    </section>
    <section id="feed" class="feed"><div class="loading">상품을 불러오는 중이에요.</div></section>
  </main>
  <nav class="bottom-nav">
    <a class="nav-item active" href="#">⌂</a><a class="nav-item" href="#feed">♡</a>
    <a class="nav-item" href="#feed">⌕</a><a class="nav-item" href="#">♙</a>
  </nav>
  <script>
    const feed = document.getElementById("feed");
    const search = document.getElementById("search");
    let products = [];

    const escapeHtml = (value) => String(value ?? "")
      .replaceAll("&", "&amp;").replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;").replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");

    function render(query = "") {
      const keyword = query.trim().toLowerCase();
      const filtered = products.filter((item) =>
        `${item.brand_name} ${item.title}`.toLowerCase().includes(keyword)
      );
      if (!filtered.length) {
        feed.innerHTML = `<div class="empty">${keyword ? "검색 결과가 없어요." : "아직 등록된 상품이 없어요.<br>곧 예쁜 상품으로 채워드릴게요."}</div>`;
        return;
      }
      feed.innerHTML = filtered.map((item) => `
        <a class="card" href="${escapeHtml(item.affiliate_url || item.product_url)}" target="_blank" rel="noopener sponsored">
          <img loading="lazy" src="${escapeHtml(item.image)}" alt="${escapeHtml(item.title)}">
          <div class="shade"></div>
          <div class="card-copy"><div class="brand">${escapeHtml(item.brand_name)}</div><div class="title">${escapeHtml(item.title)}</div></div>
          <div class="external">↗</div>
          ${item.sale_price ? `<div class="price">${escapeHtml(item.sale_price)}</div>` : ""}
        </a>
      `).join("");
    }

    fetch(`data/products.json?v=${Date.now()}`)
      .then((response) => response.ok ? response.json() : [])
      .then((data) => { products = Array.isArray(data) ? data : []; render(); })
      .catch(() => { feed.innerHTML = '<div class="empty">상품을 불러오지 못했어요.<br>잠시 뒤 다시 시도해 주세요.</div>'; });
    search.addEventListener("input", (event) => render(event.target.value));
  </script>
</body>
</html>
